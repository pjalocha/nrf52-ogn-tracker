[platformio]
default_envs = T-Echo

[env]
platform = nordicnrf52
board = nrf52840_dk_adafruit
framework = arduino
monitor_speed = 115200

build_flags =
  -DARDUINO_NRF52840_FEATHER
  -DUSE_TINYUSB
  -DUSBCON

extra_scripts =
  post:scripts/build_uf2.py

[env:T-Echo]
build_flags =
  ${env.build_flags}
  -DWITH_T_ECHO
  -DHARD_NAME=\"T-Echo\"

; The T-Echo is normally updated by copying the generated UF2 file
; from .pio/build/T-Echo/firmware.uf2 to the bootloader USB drive.

[env:Wio-Tracker]
build_flags =
  ${env.build_flags}
  -DWITH_WIO_TRACKER
  -DHARD_NAME=\"Wio-Tracker\"

; First-pass Wio Tracker L1/L1 Pro profile. It intentionally uses the same
; nRF52840 UF2/bootloader assumptions as T-Echo until the console test proves
; the board definition needs to diverge.
