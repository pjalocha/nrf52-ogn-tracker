[platformio]
default_envs = T-Echo
boards_dir = boards

[env]
platform = nordicnrf52
framework = arduino
monitor_speed = 115200

build_flags =
  -Wno-misleading-indentation
  -DWITH_NRF52
  -DUSE_TINYUSB
  -DUSBCON
  -DWITH_GPS_CONFIG
  -DWITH_GPS_PCAS
  -DWITH_GPS_PPS
  -DWITH_OGN
  -DWITH_ADSL
  -DWITH_FANET
  -DWITH_MESHT
  -DWITH_SX1262
  -DRADIOLIB_GODMODE ; advanced functions are needed from the RadioLib

lib_deps =
  RadioLib

extra_scripts =
  post:scripts/build_uf2.py

[env:T-Echo]
board = nrf52840_dk_adafruit
custom_uf2_base = 0x26000
build_flags =
  ${env.build_flags}
  -DARDUINO_NRF52840_FEATHER
  -DWITH_T_ECHO
  -DHARD_NAME=\"T-Echo\"

; The T-Echo is normally updated by copying the generated UF2 file
; from .pio/build/T-Echo/firmware.uf2 to the bootloader USB drive.

[env:Wio-Tracker]
board = seeed_wio_tracker_l1
board_build.variants_dir = variants
board_build.ldscript = ldscripts/nrf52840_s140_v7.ld
custom_uf2_base = 0x27000
build_flags =
  ${env.build_flags}
  -DWITH_WIO_TRACKER
  -DHARD_NAME=\"Wio-Tracker\"

; Wio Tracker L1 ships with SoftDevice S140 7.3.0. Its application region
; starts at 0x27000; using the T-Echo/S140 v6 address (0x26000) will not boot.
